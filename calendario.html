<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MBX — Calendário</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .cal-wrap { padding: 32px 28px; }
    .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
    .cal-nav { display: flex; align-items: center; gap: 8px; }
    .cal-nav-btn { width: 32px; height: 32px; border: 1px solid var(--border); border-radius: 8px; background: var(--surface); cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-2); font-size: 14px; }
    .cal-nav-btn:hover { background: var(--bg); }
    .cal-month { font-size: 18px; font-weight: 700; letter-spacing: -.03em; min-width: 160px; text-align: center; }
    .cal-grid { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .cal-days-header { display: grid; grid-template-columns: repeat(7,1fr); background: var(--bg); }
    .cal-day-name { padding: 12px 0; text-align: center; font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--text-3); }
    .cal-days { display: grid; grid-template-columns: repeat(7,1fr); }
    .cal-day {
      min-height: 100px; padding: 10px; border-right: 1px solid var(--border-light);
      border-bottom: 1px solid var(--border-light); cursor: pointer; transition: background .15s;
    }
    .cal-day:hover { background: #FAFAFA; }
    .cal-day.today { background: #FFFBF0; }
    .cal-day.other-month { opacity: .35; }
    .cal-day-num { font-size: 13px; font-weight: 600; width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
    .cal-day.today .cal-day-num { background: var(--text); color: #fff; }
    .cal-event { font-size: 11px; padding: 2px 6px; border-radius: 4px; margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ev-blue { background: #EEF4FF; color: #2563EB; }
    .ev-green { background: #EDFAF3; color: #1A7A4A; }
    .ev-orange { background: #FFF3EC; color: #C8530A; }
  </style>
</head>
<body>
<div class="app" id="app">
  <div id="topbar-mount"></div>
  <div class="app-body">
    <div id="sidebar-mount"></div>
    <main class="main">
      <div class="cal-wrap fade-in">
        <div class="cal-header">
          <div>
            <div style="font-size:26px;font-weight:700;letter-spacing:-.03em;margin-bottom:4px">Calendário</div>
            <div style="font-size:14px;color:var(--text-3)">Seus compromissos e eventos acadêmicos</div>
          </div>
          <div class="cal-nav">
            <button class="cal-nav-btn" onclick="changeMonth(-1)">‹</button>
            <span class="cal-month" id="calMonth">Março 2026</span>
            <button class="cal-nav-btn" onclick="changeMonth(1)">›</button>
          </div>
        </div>
        <div class="cal-grid">
          <div class="cal-days-header">
            <div class="cal-day-name">Dom</div><div class="cal-day-name">Seg</div>
            <div class="cal-day-name">Ter</div><div class="cal-day-name">Qua</div>
            <div class="cal-day-name">Qui</div><div class="cal-day-name">Sex</div>
            <div class="cal-day-name">Sáb</div>
          </div>
          <div class="cal-days" id="calDays"></div>
        </div>
      </div>
    </main>
  </div>
</div>
<script src="app.js"></script>
<script>
  let currentDate = new Date(2026, 2, 1); // March 2026
  const EVENTS = {
    '2026-3-10': [{label:'Aula: Estratégia', cls:'ev-blue'}],
    '2026-3-15': [{label:'Prova Finanças', cls:'ev-orange'}],
    '2026-3-21': [{label:'Hoje', cls:'ev-green'}],
    '2026-3-25': [{label:'TCC: Entrega', cls:'ev-orange'}],
    '2026-3-28': [{label:'Aula: Marketing', cls:'ev-blue'}],
  };
  const MONTHS = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

  function renderCal() {
    const y = currentDate.getFullYear(), m = currentDate.getMonth();
    document.getElementById('calMonth').textContent = MONTHS[m] + ' ' + y;
    const first = new Date(y, m, 1).getDay();
    const days = new Date(y, m+1, 0).getDate();
    const today = new Date(2026, 2, 21);
    let html = '';
    // prev month fill
    const prevDays = new Date(y, m, 0).getDate();
    for (let i = first - 1; i >= 0; i--) {
      html += `<div class="cal-day other-month"><div class="cal-day-num">${prevDays - i}</div></div>`;
    }
    for (let d = 1; d <= days; d++) {
      const key = `${y}-${m+1}-${d}`;
      const isToday = y===today.getFullYear() && m===today.getMonth() && d===today.getDate();
      const evs = EVENTS[key] || [];
      html += `<div class="cal-day${isToday?' today':''}">
        <div class="cal-day-num">${d}</div>
        ${evs.map(e=>`<div class="cal-event ${e.cls}">${e.label}</div>`).join('')}
      </div>`;
    }
    // next fill
    const remaining = 42 - (first + days);
    for (let d = 1; d <= remaining; d++) {
      html += `<div class="cal-day other-month"><div class="cal-day-num">${d}</div></div>`;
    }
    document.getElementById('calDays').innerHTML = html;
  }
  function changeMonth(dir) { currentDate.setMonth(currentDate.getMonth() + dir); renderCal(); }
  document.addEventListener('DOMContentLoaded', renderCal);
</script>
</body>
</html>
