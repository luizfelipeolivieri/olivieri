<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #1c2128;
      --border: #30363d;
      --accent: #58a6ff;
      --accent-hover: #79bcff;
      --text: #e6edf3;
      --muted: #8b949e;
      --nav-h: 56px;
      --sidebar-w: 220px;
    }

    html, body {
      height: 100%;
      font-family: 'Sora', sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    /* ── TOP NAV ── */
    nav.topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--nav-h);
      background: rgba(22, 27, 34, 0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      z-index: 200;
    }
    .nav-brand {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.3px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .nav-brand .dot {
      width: 8px; height: 8px;
      background: var(--accent);
      border-radius: 50%;
    }
    .nav-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .user-chip {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 13px;
      color: var(--muted);
    }
    .user-chip .avatar {
      width: 24px; height: 24px;
      background: var(--accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: #0d1117;
    }
    .btn-logout {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'Sora', sans-serif;
      font-size: 13px;
      padding: 6px 14px;
      border-radius: 8px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }
    .btn-logout:hover { color: var(--text); border-color: var(--text); }

    /* ── SIDEBAR ── */
    aside.sidebar {
      position: fixed;
      top: var(--nav-h);
      left: 0;
      bottom: 0;
      width: var(--sidebar-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 20px 12px;
      overflow-y: auto;
      z-index: 100;
      display: flex;
      flex-direction: column;
      gap: 2px;
      animation: slideIn 0.3s ease both;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-16px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .sidebar-section {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--muted);
      padding: 14px 10px 6px;
      margin-top: 4px;
    }
    .sidebar-section:first-child { padding-top: 0; }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 10px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      text-decoration: none;
      user-select: none;
    }
    .nav-item:hover { background: var(--surface2); color: var(--text); }
    .nav-item.active { background: rgba(88,166,255,0.1); color: var(--accent); }
    .nav-item .icon {
      font-size: 16px;
      width: 20px;
      text-align: center;
    }

    /* ── CONTENT ── */
    main.content {
      margin-top: var(--nav-h);
      margin-left: var(--sidebar-w);
      min-height: calc(100vh - var(--nav-h));
      padding: 32px;
      animation: fadeIn 0.4s ease both;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .page-title {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }
    .page-sub {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 32px;
    }

    /* Cards de stats */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      transition: border-color 0.2s;
    }
    .stat-card:hover { border-color: var(--accent); }
    .stat-label { font-size: 12px; color: var(--muted); margin-bottom: 8px; font-weight: 500; }
    .stat-value { font-size: 28px; font-weight: 700; letter-spacing: -1px; }
    .stat-hint  { font-size: 12px; color: var(--muted); margin-top: 4px; }

    /* Área de boas-vindas */
    .welcome-box {
      background: linear-gradient(135deg, rgba(88,166,255,0.08), rgba(88,166,255,0.02));
      border: 1px solid rgba(88,166,255,0.2);
      border-radius: 14px;
      padding: 28px;
    }
    .welcome-box h2 { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
    .welcome-box p  { color: var(--muted); font-size: 14px; line-height: 1.6; }

    /* Responsivo */
    @media (max-width: 640px) {
      aside.sidebar { width: 60px; }
      aside.sidebar .nav-item span.label { display: none; }
      aside.sidebar .sidebar-section { display: none; }
      main.content { margin-left: 60px; padding: 20px; }
    }
  </style>
</head>
<body>

  <!-- TOP NAVBAR -->
  <nav class="topbar">
    <div class="nav-brand">
      <span class="dot"></span>
      MeuApp
    </div>
    <div class="nav-right">
      <div class="user-chip">
        <div class="avatar" id="userAvatar">?</div>
        <span id="userEmail">carregando…</span>
      </div>
      <button class="btn-logout" onclick="handleLogout()">Sair</button>
    </div>
  </nav>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <span class="sidebar-section">Menu</span>

    <a class="nav-item active" onclick="showPage('inicio')">
      <span class="icon">🏠</span>
      <span class="label">Início</span>
    </a>
    <a class="nav-item" onclick="showPage('perfil')">
      <span class="icon">👤</span>
      <span class="label">Perfil</span>
    </a>
    <a class="nav-item" onclick="showPage('relatorios')">
      <span class="icon">📊</span>
      <span class="label">Relatórios</span>
    </a>

    <span class="sidebar-section">Configurações</span>

    <a class="nav-item" onclick="showPage('configuracoes')">
      <span class="icon">⚙️</span>
      <span class="label">Configurações</span>
    </a>
    <a class="nav-item" onclick="showPage('ajuda')">
      <span class="icon">❓</span>
      <span class="label">Ajuda</span>
    </a>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="content" id="mainContent">
    <!-- preenchido pelo JS -->
  </main>

  <script>
    const { createClient } = supabase;
    const sb = createClient(
      'https://zgstzbthnzrygxgaleqm.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpnc3R6YnRobnpyeWd4Z2FsZXFtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwNDAwOTUsImV4cCI6MjA4OTYxNjA5NX0.VuPCZvb44xx1BtkQYCZqmEMy1WNfnAKf8QPhMLsjWBQ'
    );

    // --- Auth guard ---
    let currentUser = null;

    (async () => {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) {
        window.location.href = 'index.html';
        return;
      }
      currentUser = session.user;
      const email = currentUser.email;
      document.getElementById('userEmail').textContent = email;
      document.getElementById('userAvatar').textContent = email[0].toUpperCase();
      showPage('inicio');
    })();

    async function handleLogout() {
      await sb.auth.signOut();
      window.location.href = 'index.html';
    }

    // --- Navegação ---
    function showPage(page) {
      // Atualiza item ativo na sidebar
      document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
      event && event.currentTarget && event.currentTarget.classList.add('active');

      const pages = {
        inicio: `
          <p class="page-title">Início</p>
          <p class="page-sub">Bem-vindo ao seu painel de controle.</p>
          <div class="stats-grid">
            <div class="stat-card">
              <div class="stat-label">Usuários</div>
              <div class="stat-value">128</div>
              <div class="stat-hint">+12 este mês</div>
            </div>
            <div class="stat-card">
              <div class="stat-label">Projetos</div>
              <div class="stat-value">34</div>
              <div class="stat-hint">3 em andamento</div>
            </div>
            <div class="stat-card">
              <div class="stat-label">Tarefas</div>
              <div class="stat-value">91</div>
              <div class="stat-hint">17 pendentes</div>
            </div>
          </div>
          <div class="welcome-box">
            <h2>Tudo certo por aqui ✨</h2>
            <p>Este é o seu dashboard. Use o menu lateral para navegar entre as seções.<br>
               Personalize esta área com seus componentes e dados.</p>
          </div>
        `,
        perfil: `
          <p class="page-title">Perfil</p>
          <p class="page-sub">Gerencie suas informações pessoais.</p>
          <div class="welcome-box">
            <h2>Em construção 🔧</h2>
            <p>Esta seção ainda será configurada.</p>
          </div>
        `,
        relatorios: `
          <p class="page-title">Relatórios</p>
          <p class="page-sub">Visualize análises e dados.</p>
          <div class="welcome-box">
            <h2>Em construção 🔧</h2>
            <p>Esta seção ainda será configurada.</p>
          </div>
        `,
        configuracoes: `
          <p class="page-title">Configurações</p>
          <p class="page-sub">Ajuste as preferências do sistema.</p>
          <div class="welcome-box">
            <h2>Em construção 🔧</h2>
            <p>Esta seção ainda será configurada.</p>
          </div>
        `,
        ajuda: `
          <p class="page-title">Ajuda</p>
          <p class="page-sub">Documentação e suporte.</p>
          <div class="welcome-box">
            <h2>Em construção 🔧</h2>
            <p>Esta seção ainda será configurada.</p>
          </div>
        `,
      };
      document.getElementById('mainContent').innerHTML = pages[page] || '<p>Página não encontrada.</p>';
    }

    // Marca o item clicado como ativo corretamente
    document.querySelectorAll('.nav-item').forEach(item => {
      item.addEventListener('click', function() {
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        this.classList.add('active');
      });
    });
  </script>

</body>
</html>
