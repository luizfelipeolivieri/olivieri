<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Financeiro</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #1c2128;
      --surface3: #21262d;
      --border: #30363d;
      --accent: #58a6ff;
      --text: #e6edf3;
      --muted: #8b949e;
      --green: #3fb950;
      --nav-h: 56px;
      --sidebar-w: 220px;
      --col1-w: 180px;
    }

    html, body { height: 100%; font-family: 'Sora', sans-serif; background: var(--bg); color: var(--text); }

    /* ── TOP NAV ── */
    nav.topbar {
      position: fixed; top: 0; left: 0; right: 0; height: var(--nav-h);
      background: rgba(22,27,34,0.92); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; z-index: 200;
    }
    .btn-sidebar-toggle {
      display: inline-flex; align-items: center; justify-content: center;
      width: 36px; height: 36px; background: transparent;
      border: 1px solid var(--border); border-radius: 8px; color: var(--muted);
      cursor: pointer; transition: background .15s, color .15s, border-color .15s;
      flex-shrink: 0;
    }
    .btn-sidebar-toggle:hover { background: var(--surface2); color: var(--text); border-color: var(--text); }
    .btn-sidebar-toggle svg  { width: 18px; height: 18px; }

    .nav-right { display: flex; align-items: center; gap: 10px; }

    .user-avatar-btn {
      position: relative; width: 34px; height: 34px;
      background: var(--accent); border: none; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Sora', sans-serif; font-size: 13px; font-weight: 700;
      color: #0d1117; cursor: pointer; transition: transform .15s, box-shadow .15s;
    }
    .user-avatar-btn:hover { transform: scale(1.07); box-shadow: 0 0 0 3px rgba(88,166,255,.3); }
    .user-avatar-btn::after {
      content: attr(data-email); position: absolute; top: calc(100% + 8px); right: 0;
      background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
      padding: 6px 12px; font-size: 12px; font-weight: 400; color: var(--text);
      white-space: nowrap; pointer-events: none; opacity: 0; transform: translateY(-4px);
      transition: opacity .15s, transform .15s; z-index: 300;
    }
    .user-avatar-btn:hover::after { opacity: 1; transform: translateY(0); }

    .btn-logout {
      background: transparent; border: 1px solid var(--border); color: var(--muted);
      font-family: 'Sora', sans-serif; font-size: 13px; padding: 6px 14px;
      border-radius: 8px; cursor: pointer; transition: color .2s, border-color .2s;
    }
    .btn-logout:hover { color: var(--text); border-color: var(--text); }

    /* ── SIDEBAR ── */
    aside.sidebar {
      position: fixed; top: var(--nav-h); left: 0; bottom: 0; width: var(--sidebar-w);
      background: var(--surface); border-right: 1px solid var(--border);
      padding: 16px 10px; overflow-y: auto; overflow-x: hidden;
      z-index: 100; display: flex; flex-direction: column; gap: 2px;
      animation: slideIn .3s ease both; transition: width .25s ease;
    }
    aside.sidebar.collapsed { width: 56px; padding: 16px 8px; }
    aside.sidebar.collapsed .label { display: none; }
    aside.sidebar.collapsed .nav-item { justify-content: center; padding: 9px 0; }
    main.content { transition: margin-left .25s ease; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-16px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .nav-item {
      display: flex; align-items: center; gap: 10px; padding: 9px 10px;
      border-radius: 8px; font-size: 14px; font-weight: 500; color: var(--muted);
      cursor: pointer; text-decoration: none; user-select: none;
      transition: background .15s, color .15s;
    }
    .nav-item:hover  { background: var(--surface2); color: var(--text); }
    .nav-item.active { background: rgba(88,166,255,.1); color: var(--accent); }
    .nav-item .icon  { display: flex; align-items: center; justify-content: center; flex-shrink: 0; width: 20px; height: 20px; }
    .nav-item .icon svg { width: 18px; height: 18px; }

    /* ── CONTENT ── */
    main.content {
      margin-top: var(--nav-h); margin-left: var(--sidebar-w);
      min-height: calc(100vh - var(--nav-h)); padding: 28px 32px;
      animation: fadeIn .4s ease both;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .page-title { font-size: 22px; font-weight: 700; letter-spacing: -.5px; margin-bottom: 4px; }
    .page-sub   { color: var(--muted); font-size: 13px; margin-bottom: 24px; }

    /* ── TABLE WRAPPER ── */
    .table-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
      overflow: hidden;
    }
    .table-scroll { overflow-x: auto; }

    table {
      width: 100%; border-collapse: collapse;
      min-width: calc(var(--col1-w) + 13 * 100px);
    }

    /* Header row */
    thead th {
      background: var(--surface3); border-bottom: 1px solid var(--border);
      padding: 11px 14px; font-size: 11px; font-weight: 600; letter-spacing: .6px;
      text-transform: uppercase; color: var(--muted); white-space: nowrap;
      text-align: right; position: sticky; top: 0; z-index: 10;
    }
    thead th:first-child {
      text-align: left; width: var(--col1-w); min-width: var(--col1-w);
      position: sticky; left: 0; z-index: 20; background: var(--surface3);
    }

    /* ── CATEGORY rows ── */
    tr.cat-row td {
      background: var(--surface2); border-top: 2px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 10px 14px; font-size: 13px; font-weight: 600; color: var(--text);
      white-space: nowrap;
    }
    tr.cat-row td:first-child {
      position: sticky; left: 0; z-index: 5; background: var(--surface2);
      display: flex; align-items: center; gap: 8px; cursor: pointer;
      user-select: none;
    }
    tr.cat-row td .chevron {
      display: inline-flex; align-items: center; justify-content: center;
      width: 16px; height: 16px; transition: transform .2s; flex-shrink: 0;
    }
    tr.cat-row td .chevron svg { width: 14px; height: 14px; }
    tr.cat-row td.collapsed-cat .chevron { transform: rotate(-90deg); }

    .cat-total {
      text-align: right; color: var(--accent); font-variant-numeric: tabular-nums;
      font-size: 13px;
    }

    /* ── SUBCATEGORY rows ── */
    tr.sub-row td {
      padding: 7px 14px; font-size: 13px; color: var(--muted);
      border-bottom: 1px solid rgba(48,54,61,.5); background: var(--surface);
      white-space: nowrap;
    }
    tr.sub-row td:first-child {
      position: sticky; left: 0; z-index: 5; background: var(--surface);
      padding-left: 36px; color: var(--muted);
    }
    tr.sub-row:hover td { background: rgba(28,33,40,.8); }
    tr.sub-row:hover td:first-child { background: rgba(28,33,40,.8); }

    tr.sub-row td.hidden-row, tr.sub-row.hidden-row { display: none; }

    /* ── TOTAL row ── */
    tr.total-row td {
      background: var(--surface3); border-top: 2px solid var(--border);
      padding: 11px 14px; font-size: 13px; font-weight: 700; color: var(--green);
      white-space: nowrap;
    }
    tr.total-row td:first-child {
      position: sticky; left: 0; z-index: 5; background: var(--surface3);
    }
    tr.total-row td.total-val { text-align: right; font-variant-numeric: tabular-nums; }

    /* ── INPUTS ── */
    .money-input {
      width: 90px; background: transparent; border: none; border-radius: 6px;
      padding: 4px 6px; text-align: right; font-family: 'Sora', sans-serif;
      font-size: 13px; color: var(--text); font-variant-numeric: tabular-nums;
      outline: none; transition: background .15s, color .15s;
      display: block; margin-left: auto;
    }
    .money-input:focus {
      background: rgba(88,166,255,.08); color: var(--text); outline: none;
    }
    .money-input::placeholder { color: var(--border); }

    @media (max-width: 640px) {
      aside.sidebar { width: 56px; padding: 16px 8px; }
      aside.sidebar .label { display: none; }
      aside.sidebar .nav-item { justify-content: center; padding: 9px 0; }
      main.content { margin-left: 56px; padding: 20px 12px; }
    }
  </style>
</head>
<body>

  <!-- TOP NAVBAR -->
  <nav class="topbar">
    <button class="btn-sidebar-toggle" aria-label="Controlar sidebar" type="button" onclick="toggleSidebar()">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"/>
      </svg>
    </button>
    <div class="nav-right">
      <button class="user-avatar-btn" id="userAvatar" data-email="carregando…">?</button>
      <button class="btn-logout" onclick="handleLogout()">Sair</button>
    </div>
  </nav>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">

    <a class="nav-item" href="dashboard.html">
      <span class="icon"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m2.25 12 8.954-8.955a1.126 1.126 0 0 1 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25"/></svg></span>
      <span class="label">Início</span>
    </a>

    <a class="nav-item" href="#">
      <span class="icon"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 0 1 2.25-2.25h13.5A2.25 2.25 0 0 1 21 7.5v11.25m-18 0A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75m-18 0v-7.5A2.25 2.25 0 0 1 5.25 9h13.5A2.25 2.25 0 0 1 21 11.25v7.5"/></svg></span>
      <span class="label">Calendário</span>
    </a>

    <a class="nav-item" href="#">
      <span class="icon"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 0 0-3 3h15.75m-12.75-3h11.218c1.121-2.3 2.1-4.684 2.924-7.138a60.114 60.114 0 0 0-16.536-1.84M7.5 14.25 5.106 5.272M6 20.25a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Zm12.75 0a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Z"/></svg></span>
      <span class="label">Mercado</span>
    </a>

    <a class="nav-item" href="#">
      <span class="icon"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M4.26 10.147a60.438 60.438 0 0 0-.491 6.347A48.62 48.62 0 0 1 12 20.904a48.62 48.62 0 0 1 8.232-4.41 60.46 60.46 0 0 0-.491-6.347m-15.482 0a50.636 50.636 0 0 0-2.658-.813A59.906 59.906 0 0 1 12 3.493a59.903 59.903 0 0 1 10.399 5.84c-.896.248-1.783.52-2.658.814m-15.482 0A50.717 50.717 0 0 1 12 13.489a50.702 50.702 0 0 1 3.741-3.342M6.75 15a.75.75 0 1 0 0-1.5.75.75 0 0 0 0 1.5Zm0 0v-3.675A55.378 55.378 0 0 1 12 8.443m-7.007 11.55A5.981 5.981 0 0 0 6.75 15.75v-1.5"/></svg></span>
      <span class="label">Meus Cursos</span>
    </a>

    <a class="nav-item active" href="financeiro.html">
      <span class="icon"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v12m-3-2.818.879.659c1.171.879 3.07.879 4.242 0 1.172-.879 1.172-2.303 0-3.182C13.536 12.219 12.768 12 12 12c-.725 0-1.45-.22-2.003-.659-1.106-.879-1.106-2.303 0-3.182s2.9-.879 4.006 0l.415.33M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/></svg></span>
      <span class="label">Financeiro</span>
    </a>

    <a class="nav-item" href="#">
      <span class="icon"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6.042A8.967 8.967 0 0 0 6 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 0 1 6 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 0 1 6-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0 0 18 18a8.967 8.967 0 0 0-6 2.292m0-14.25v14.25"/></svg></span>
      <span class="label">Biblioteca Digital</span>
    </a>

  </aside>

  <!-- MAIN CONTENT -->
  <main class="content">
    <p class="page-title">Financeiro</p>
    <p class="page-sub">Registre e acompanhe suas despesas mensais</p>

    <div class="table-card">
      <div class="table-scroll">
        <table id="finTable">
          <!-- gerada pelo JS -->
        </table>
      </div>
    </div>
  </main>

  <script>
    /* ── SUPABASE AUTH ── */
    const { createClient } = supabase;
    const sb = createClient(
      'https://zgstzbthnzrygxgaleqm.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpnc3R6YnRobnpyeWd4Z2FsZXFtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwNDAwOTUsImV4cCI6MjA4OTYxNjA5NX0.VuPCZvb44xx1BtkQYCZqmEMy1WNfnAKf8QPhMLsjWBQ'
    );

    (async () => {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) { window.location.href = 'index.html'; return; }
      const email = session.user.email;
      const btn   = document.getElementById('userAvatar');
      btn.textContent = email[0].toUpperCase();
      btn.setAttribute('data-email', email);
    })();

    async function handleLogout() {
      await sb.auth.signOut();
      window.location.href = 'index.html';
    }

    function toggleSidebar() {
      const sidebar  = document.getElementById('sidebar');
      const content  = document.querySelector('main.content');
      sidebar.classList.toggle('collapsed');
      content.style.marginLeft = sidebar.classList.contains('collapsed') ? '56px' : 'var(--sidebar-w)';
    }

    /* ── ESTRUTURA DE DADOS ── */
    const MONTHS = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];

    const CATEGORIES = [
      { id: 'alimentacao', label: 'Alimentação',      subs: ['Supermercado','Restaurante'] },
      { id: 'moradia',     label: 'Moradia',           subs: ['Água','Luz','Internet','IPTU'] },
      { id: 'educacao',    label: 'Educação',          subs: ['Mensalidade','Material'] },
      { id: 'saude',       label: 'Saúde',             subs: ['Medicamentos','Dentista'] },
      { id: 'transporte',  label: 'Transporte',        subs: ['Público','Uber'] },
      { id: 'lazer',       label: 'Lazer',             subs: ['Cinema','Viagens'] },
      { id: 'pessoal',     label: 'Pessoal',           subs: ['Higiene','Vestuário'] },
    ];

    /* valores[catId][subLabel][monthIndex] = number */
    const values = {};
    CATEGORIES.forEach(cat => {
      values[cat.id] = {};
      cat.subs.forEach(sub => {
        values[cat.id][sub] = new Array(12).fill(0);
      });
    });

    /* ── FORMATAÇÃO CURRENCY (pt-BR) ── */
    function fmtBRL(n) {
      return n.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function parseBRL(str) {
      if (!str || str.trim() === '') return 0;
      // Remove separador de milhar (.) e troca vírgula decimal por ponto
      const clean = str.replace(/\./g, '').replace(',', '.');
      const n = parseFloat(clean);
      return isNaN(n) ? 0 : n;
    }

    /* ── CÁLCULO DE TOTAIS ── */
    function catTotal(catId, mi) {
      return Object.values(values[catId]).reduce((acc, arr) => acc + arr[mi], 0);
    }

    function grandTotal(mi) {
      return CATEGORIES.reduce((acc, cat) => acc + catTotal(cat.id, mi), 0);
    }

    /* ── UPDATE visual dos totais ── */
    function updateTotals(catId) {
      // total de cada mês da categoria
      MONTHS.forEach((_, mi) => {
        const el = document.getElementById(`total-${catId}-${mi}`);
        if (el) el.textContent = fmtBRL(catTotal(catId, mi));
      });
      // grand total
      MONTHS.forEach((_, mi) => {
        const el = document.getElementById(`grand-${mi}`);
        if (el) el.textContent = fmtBRL(grandTotal(mi));
      });
    }

    /* ── COLLAPSE / EXPAND categoria ── */
    function toggleCategory(catId) {
      const subRows = document.querySelectorAll(`.sub-${catId}`);
      const catTd   = document.getElementById(`cat-td-${catId}`);
      const chevron = catTd.querySelector('.chevron');
      const hidden  = subRows[0]?.classList.contains('hidden-row');

      subRows.forEach(r => r.classList.toggle('hidden-row', !hidden));
      catTd.classList.toggle('collapsed-cat', !hidden);
    }

    /* ── BUILD TABLE ── */
    function buildTable() {
      const table = document.getElementById('finTable');

      // THEAD
      const thead = document.createElement('thead');
      const hrow  = document.createElement('tr');
      const thD   = document.createElement('th');
      thD.textContent = 'Despesas';
      hrow.appendChild(thD);
      MONTHS.forEach(m => {
        const th = document.createElement('th');
        th.textContent = m;
        hrow.appendChild(th);
      });
      thead.appendChild(hrow);
      table.appendChild(thead);

      // TBODY
      const tbody = document.createElement('tbody');

      CATEGORIES.forEach(cat => {

        /* ── Linha da categoria (totais) ── */
        const catRow = document.createElement('tr');
        catRow.className = 'cat-row';

        const tdLabel = document.createElement('td');
        tdLabel.id = `cat-td-${cat.id}`;
        tdLabel.innerHTML = `
          <span class="chevron">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5"/>
            </svg>
          </span>
          ${cat.label}
        `;
        tdLabel.onclick = () => toggleCategory(cat.id);
        catRow.appendChild(tdLabel);

        MONTHS.forEach((_, mi) => {
          const td = document.createElement('td');
          td.className = 'cat-total';
          td.id = `total-${cat.id}-${mi}`;
          td.textContent = '0,00';
          catRow.appendChild(td);
        });

        tbody.appendChild(catRow);

        /* ── Linhas das subcategorias ── */
        cat.subs.forEach(sub => {
          const subRow = document.createElement('tr');
          subRow.className = `sub-row sub-${cat.id}`;

          const tdSub = document.createElement('td');
          tdSub.textContent = sub;
          subRow.appendChild(tdSub);

          MONTHS.forEach((_, mi) => {
            const td    = document.createElement('td');
            const input = document.createElement('input');
            input.type        = 'text';
            input.className   = 'money-input';
            input.placeholder = '0,00';
            input.inputMode   = 'decimal';

            // on focus: mostra valor bruto para edição fácil
            input.addEventListener('focus', function () {
              const raw = values[cat.id][sub][mi];
              this.value = raw === 0 ? '' : fmtBRL(raw);
              this.select();
            });

            // on input: permite apenas dígitos, vírgula e ponto
            input.addEventListener('input', function () {
              this.value = this.value.replace(/[^\d.,]/g, '');
            });

            // on blur: formata e atualiza totais
            input.addEventListener('blur', function () {
              const parsed = parseBRL(this.value);
              values[cat.id][sub][mi] = parsed;
              this.value = parsed === 0 ? '' : fmtBRL(parsed);
              updateTotals(cat.id);
            });

            // Enter avança para próximo mês
            input.addEventListener('keydown', function (e) {
              if (e.key === 'Enter') {
                e.preventDefault();
                const allInputs = Array.from(document.querySelectorAll('.money-input'));
                const idx = allInputs.indexOf(this);
                if (idx !== -1 && idx < allInputs.length - 1) allInputs[idx + 1].focus();
              }
            });

            td.appendChild(input);
            subRow.appendChild(td);
          });

          tbody.appendChild(subRow);
        });
      });

      /* ── Linha Grand Total ── */
      const totalRow = document.createElement('tr');
      totalRow.className = 'total-row';

      const tdTotalLabel = document.createElement('td');
      tdTotalLabel.textContent = 'Total Geral';
      totalRow.appendChild(tdTotalLabel);

      MONTHS.forEach((_, mi) => {
        const td = document.createElement('td');
        td.className = 'total-val';
        td.id = `grand-${mi}`;
        td.textContent = '0,00';
        totalRow.appendChild(td);
      });

      tbody.appendChild(totalRow);
      table.appendChild(tbody);
    }

    buildTable();
  </script>

</body>
</html>
