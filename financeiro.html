<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Financeiro</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #1c2128;
      --surface3: #21262d;
      --border: #30363d;
      --accent: #58a6ff;
      --text: #e6edf3;
      --muted: #8b949e;
      --green: #3fb950;
      --nav-h: 56px;
      --sidebar-w: 220px;
      --col1-w: 180px;
    }

    html, body { height: 100%; font-family: 'Sora', sans-serif; background: var(--bg); color: var(--text); }

    /* ── TOP NAV ── */
    nav.topbar {
      position: fixed; top: 0; left: 0; right: 0; height: var(--nav-h);
      background: rgba(22,27,34,0.92); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; z-index: 200;
    }
    .btn-sidebar-toggle {
      display: inline-flex; align-items: center; justify-content: center;
      width: 36px; height: 36px; background: transparent;
      border: 1px solid var(--border); border-radius: 8px; color: var(--muted);
      cursor: pointer; transition: background .15s, color .15s, border-color .15s;
      flex-shrink: 0;
    }
    .btn-sidebar-toggle:hover { background: var(--surface2); color: var(--text); border-color: var(--text); }
    .btn-sidebar-toggle svg  { width: 18px; height: 18px; }

    .nav-right { display: flex; align-items: center; gap: 10px; }

    .user-avatar-btn {
      position: relative; width: 34px; height: 34px;
      background: var(--accent); border: none; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Sora', sans-serif; font-size: 13px; font-weight: 700;
      color: #0d1117; cursor: pointer; transition: transform .15s, box-shadow .15s;
    }
    .user-avatar-btn:hover { transform: scale(1.07); box-shadow: 0 0 0 3px rgba(88,166,255,.3); }
    .user-avatar-btn::after {
      content: attr(data-email); position: absolute; top: calc(100% + 8px); right: 0;
      background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
      padding: 6px 12px; font-size: 12px; font-weight: 400; color: var(--text);
      white-space: nowrap; pointer-events: none; opacity: 0; transform: translateY(-4px);
      transition: opacity .15s, transform .15s; z-index: 300;
    }
    .user-avatar-btn:hover::after { opacity: 1; transform: translateY(0); }

    .btn-logout {
      background: transparent; border: 1px solid var(--border); color: var(--muted);
      font-family: 'Sora', sans-serif; font-size: 13px; padding: 6px 14px;
      border-radius: 8px; cursor: pointer; transition: color .2s, border-color .2s;
    }
    .btn-logout:hover { color: var(--text); border-color: var(--text); }

    /* ── SIDEBAR ── */
    aside.sidebar {
      position: fixed; top: var(--nav-h); left: 0; bottom: 0; width: var(--sidebar-w);
      background: var(--surface); border-right: 1px solid var(--border);
      padding: 16px 10px; overflow-y: auto; overflow-x: hidden;
      z-index: 100; display: flex; flex-direction: column; gap: 2px;
      animation: slideIn .3s ease both; transition: width .25s ease;
    }
    aside.sidebar.collapsed { width: 56px; padding: 16px 8px; }
    aside.sidebar.collapsed .label { display: none; }
    aside.sidebar.collapsed .nav-item { justify-content: center; padding: 9px 0; }
    main.content { transition: margin-left .25s ease; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-16px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .nav-item {
      display: flex; align-items: center; gap: 10px; padding: 9px 10px;
      border-radius: 8px; font-size: 14px; font-weight: 500; color: var(--muted);
      cursor: pointer; text-decoration: none; user-select: none;
      transition: background .15s, color .15s;
    }
    .nav-item:hover  { background: var(--surface2); color: var(--text); }
    .nav-item.active { background: rgba(88,166,255,.1); color: var(--accent); }
    .nav-item .icon  { display: flex; align-items: center; justify-content: center; flex-shrink: 0; width: 20px; height: 20px; }
    .nav-item .icon svg { width: 18px; height: 18px; }

    /* ── CONTENT ── */
    main.content {
      margin-top: var(--nav-h); margin-left: var(--sidebar-w);
      min-height: calc(100vh - var(--nav-h)); padding: 28px 32px;
      animation: fadeIn .4s ease both;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .page-header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 8px; }
    .page-title  { font-size: 22px; font-weight: 700; letter-spacing: -.5px; }
    .page-sub    { color: var(--muted); font-size: 13px; margin-top: 4px; }

    /* save status pill */
    #saveStatus {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 12px; font-weight: 500; padding: 4px 12px;
      border-radius: 20px; border: 1px solid transparent;
      transition: opacity .3s; opacity: 0;
    }
    #saveStatus.saving  { opacity: 1; color: var(--muted);  border-color: var(--border); background: var(--surface2); }
    #saveStatus.saved   { opacity: 1; color: var(--green);  border-color: rgba(63,185,80,.3); background: rgba(63,185,80,.08); }
    #saveStatus.error   { opacity: 1; color: #ff7b72;       border-color: rgba(255,123,114,.3); background: rgba(255,123,114,.08); }
    #saveStatus svg     { width: 13px; height: 13px; }

    /* ── TABLE WRAPPER ── */
    .table-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
      overflow: hidden;
    }
    .table-scroll { overflow-x: auto; }

    table {
      border-collapse: collapse;
      table-layout: fixed;
      width: max-content;
      min-width: 100%;
    }

    /* Header row */
    thead th {
      background: var(--surface3); border-bottom: 1px solid var(--border);
      padding: 11px 14px; font-size: 11px; font-weight: 600; letter-spacing: .6px;
      text-transform: uppercase; color: var(--muted); white-space: nowrap;
      text-align: right; position: sticky; top: 0; z-index: 10;
      width: 110px; min-width: 110px;
    }
    thead th:first-child {
      text-align: left; width: 190px; min-width: 190px;
      position: sticky; left: 0; z-index: 20; background: var(--surface3);
    }

    /* ── CATEGORY rows ── */
    tr.cat-row td {
      background: var(--surface2); border-top: 2px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 10px 14px; font-size: 13px; font-weight: 600; color: var(--text);
      white-space: nowrap; text-align: right;
    }
    tr.cat-row td:first-child {
      position: sticky; left: 0; z-index: 5; background: var(--surface2);
      display: flex; align-items: center; gap: 8px; cursor: pointer;
      user-select: none; text-align: left;
    }
    tr.cat-row td .chevron {
      display: inline-flex; align-items: center; justify-content: center;
      width: 16px; height: 16px; transition: transform .2s; flex-shrink: 0;
    }
    tr.cat-row td .chevron svg { width: 14px; height: 14px; }
    tr.cat-row td.collapsed-cat .chevron { transform: rotate(-90deg); }

    .cat-total {
      text-align: right; color: var(--accent); font-variant-numeric: tabular-nums;
      font-size: 13px;
    }

    /* ── SUBCATEGORY rows ── */
    tr.sub-row td {
      padding: 7px 14px; font-size: 13px; color: var(--muted);
      border-bottom: 1px solid rgba(48,54,61,.5); background: var(--surface);
      white-space: nowrap;
    }
    tr.sub-row td:first-child {
      position: sticky; left: 0; z-index: 5; background: var(--surface);
      padding-left: 36px; color: var(--muted);
    }
    tr.sub-row:hover td { background: rgba(28,33,40,.8); }
    tr.sub-row:hover td:first-child { background: rgba(28,33,40,.8); }

    tr.sub-row td.hidden-row, tr.sub-row.hidden-row { display: none; }

    /* ── TOTAL row ── */
    tr.total-row td {
      background: var(--surface3); border-top: 2px solid var(--border);
      padding: 11px 14px; font-size: 13px; font-weight: 700; color: var(--green);
      white-space: nowrap;
    }
    tr.total-row td:first-child {
      position: sticky; left: 0; z-index: 5; background: var(--surface3);
    }
    tr.total-row td.total-val { text-align: right; font-variant-numeric: tabular-nums; }

    /* ── RENDA row ── */
    tr.renda-row td {
      background: var(--surface2); border-top: 1px solid var(--border);
      padding: 9px 14px; font-size: 13px; font-weight: 600; color: var(--text);
      white-space: nowrap;
    }
    tr.renda-row td:first-child {
      position: sticky; left: 0; z-index: 5; background: var(--surface2);
    }

    /* ── RESULTADO row ── */
    tr.resultado-row td {
      background: var(--surface3); border-top: 2px solid var(--border);
      padding: 11px 14px; font-size: 13px; font-weight: 700; white-space: nowrap;
    }
    tr.resultado-row td:first-child {
      position: sticky; left: 0; z-index: 5; background: var(--surface3);
      color: var(--text);
    }
    tr.resultado-row td.resultado-val {
      text-align: right; font-variant-numeric: tabular-nums;
    }
    tr.resultado-row td.positivo { color: var(--green); }
    tr.resultado-row td.negativo { color: #ff7b72; }

    /* ── INPUTS ── */
    .money-input {
      width: 100%; background: transparent; border: none; border-radius: 6px;
      padding: 4px 6px; text-align: right; font-family: 'Sora', sans-serif;
      font-size: 13px; color: var(--text); font-variant-numeric: tabular-nums;
      outline: none; transition: background .15s, color .15s;
      display: block;
    }
    .money-input:focus {
      background: rgba(88,166,255,.08); color: var(--text); outline: none;
    }
    .money-input::placeholder { color: #3a4149; }

    @media (max-width: 640px) {
      aside.sidebar { width: 56px; padding: 16px 8px; }
      aside.sidebar .label { display: none; }
      aside.sidebar .nav-item { justify-content: center; padding: 9px 0; }
      main.content { margin-left: 56px; padding: 20px 12px; }
    }
  </style>
</head>
<body>

  <aside class="sidebar" id="sidebar">

  <!-- MAIN CONTENT -->
  <main class="content">
    <div class="page-header">
      <div>
        <p class="page-title">Financeiro</p>

        <table id="finTable">

  <script>
    /* ── SUPABASE ── */
    const { createClient } = supabase;
    const sb = createClient(
      'https://zgstzbthnzrygxgaleqm.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpnc3R6YnRobnpyeWd4Z2FsZXFtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwNDAwOTUsImV4cCI6MjA4OTYxNjA5NX0.VuPCZvb44xx1BtkQYCZqmEMy1WNfnAKf8QPhMLsjWBQ'
    );

    let currentUserId = null;
    const CURRENT_YEAR = new Date().getFullYear();

    /* ── AUTH ── */
    (async () => {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) { window.location.href = 'index.html'; return; }
      currentUserId = session.user.id;
      const email = session.user.email;
      const btn   = document.getElementById('userAvatar');
      btn.textContent = email[0].toUpperCase();
      btn.setAttribute('data-email', email);

      buildTable();
      await loadData();
    })();

    async function handleLogout() {
      await sb.auth.signOut();
      window.location.href = 'index.html';
    }

    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      const content = document.querySelector('main.content');
      sidebar.classList.toggle('collapsed');
      content.style.marginLeft = sidebar.classList.contains('collapsed') ? '56px' : 'var(--sidebar-w)';
    }

    /* ── ESTRUTURA DE DADOS ── */
    const MONTHS = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];

    const CATEGORIES = [
      { id: 'alimentacao', label: 'Alimentação',  subs: ['Supermercado','Restaurante'] },
      { id: 'moradia',     label: 'Moradia',       subs: ['Água','Luz','Internet','IPTU'] },
      { id: 'educacao',    label: 'Educação',      subs: ['Mensalidade','Material'] },
      { id: 'saude',       label: 'Saúde',         subs: ['Medicamentos','Dentista'] },
      { id: 'transporte',  label: 'Transporte',    subs: ['Público','Uber'] },
      { id: 'lazer',       label: 'Lazer',         subs: ['Cinema','Viagens'] },
      { id: 'pessoal',     label: 'Pessoal',       subs: ['Higiene','Vestuário'] },
    ];

    const values = {};
    CATEGORIES.forEach(cat => {
      values[cat.id] = {};
      cat.subs.forEach(sub => { values[cat.id][sub] = new Array(12).fill(0); });
    });

    const rendaValues = new Array(12).fill(0);

    /* ── FORMATAÇÃO ── */
    function fmtBRL(n) {
      return n.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }
    function parseBRL(str) {
      if (!str || str.trim() === '') return 0;
      const clean = str.replace(/\./g, '').replace(',', '.');
      const n = parseFloat(clean);
      return isNaN(n) ? 0 : n;
    }

    /* ── CÁLCULOS ── */
    function catTotal(catId, mi) {
      return Object.values(values[catId]).reduce((acc, arr) => acc + arr[mi], 0);
    }
    function grandTotal(mi) {
      return CATEGORIES.reduce((acc, cat) => acc + catTotal(cat.id, mi), 0);
    }

    function updateTotals(catId) {
      MONTHS.forEach((_, mi) => {
        const el  = document.getElementById(`total-${catId}-${mi}`);
        const val = catTotal(catId, mi);
        if (el) el.textContent = val === 0 ? '' : fmtBRL(val);
      });
      updateGrandAndResultado();
    }

    function updateGrandAndResultado() {
      MONTHS.forEach((_, mi) => {
        const desp   = grandTotal(mi);
        const renda  = rendaValues[mi];
        const result = renda - desp;

        const elGrand = document.getElementById(`grand-${mi}`);
        if (elGrand) elGrand.textContent = desp === 0 ? '' : fmtBRL(desp);

        const elRes = document.getElementById(`resultado-${mi}`);
        if (elRes) {
          elRes.textContent = (renda === 0 && desp === 0) ? '' : fmtBRL(result);
          elRes.className   = 'resultado-val ' + (result >= 0 ? 'positivo' : 'negativo');
        }
      });
    }

    /* ── COLLAPSE ── */
    function toggleCategory(catId) {
      const subRows = document.querySelectorAll(`.sub-${catId}`);
      const catTd   = document.getElementById(`cat-td-${catId}`);
      const hidden  = subRows[0]?.classList.contains('hidden-row');
      subRows.forEach(r => r.classList.toggle('hidden-row', !hidden));
      catTd.classList.toggle('collapsed-cat', !hidden);
    }

    /* ── SAVE STATUS ── */
    let saveTimer = null;
    function showStatus(type, msg) {
      const el = document.getElementById('saveStatus');
      const icons = {
        saving: `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182m0-4.991v4.99"/></svg>`,
        saved:  `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m4.5 12.75 6 6 9-13.5"/></svg>`,
        error:  `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z"/></svg>`,
      };
      el.className = `saveStatus ${type}`;
      el.innerHTML = `${icons[type]} ${msg}`;
      if (type === 'saved') {
        clearTimeout(saveTimer);
        saveTimer = setTimeout(() => { el.style.opacity = '0'; }, 3000);
      }
    }

    /* ── SUPABASE: LOAD ── */
    async function loadData() {
      const { data, error } = await sb
        .from('financeiro_data')
        .select('data')
        .eq('user_id', currentUserId)
        .eq('year', CURRENT_YEAR)
        .maybeSingle();

      if (error) { console.error('Erro ao carregar:', error); return; }
      if (!data) return; // sem dados salvos ainda

      const saved = data.data;

      // Preenche values
      if (saved.values) {
        CATEGORIES.forEach(cat => {
          if (saved.values[cat.id]) {
            cat.subs.forEach(sub => {
              if (saved.values[cat.id][sub]) {
                values[cat.id][sub] = saved.values[cat.id][sub];
              }
            });
          }
        });
      }

      // Preenche renda
      if (saved.renda) {
        saved.renda.forEach((v, i) => { rendaValues[i] = v; });
      }

      // Atualiza UI
      refreshAllInputs();
      CATEGORIES.forEach(cat => updateTotals(cat.id));
      updateGrandAndResultado();
    }

    /* ── SUPABASE: SAVE (debounced 800ms) ── */
    let debounceTimer = null;
    function scheduleSave() {
      clearTimeout(debounceTimer);
      showStatus('saving', 'Salvando…');
      debounceTimer = setTimeout(saveData, 800);
    }

    async function saveData() {
      if (!currentUserId) return;
      const payload = { values, renda: rendaValues };

      const { error } = await sb
        .from('financeiro_data')
        .upsert(
          { user_id: currentUserId, year: CURRENT_YEAR, data: payload, updated_at: new Date().toISOString() },
          { onConflict: 'user_id,year' }
        );

      if (error) {
        console.error('Erro ao salvar:', error);
        showStatus('error', 'Erro ao salvar');
      } else {
        showStatus('saved', 'Salvo');
      }
    }

    /* ── Atualiza todos os inputs com valores da memória ── */
    function refreshAllInputs() {
      CATEGORIES.forEach(cat => {
        cat.subs.forEach(sub => {
          MONTHS.forEach((_, mi) => {
            const input = document.getElementById(`input-${cat.id}-${sub}-${mi}`);
            if (input) {
              const v = values[cat.id][sub][mi];
              input.value = v === 0 ? '' : fmtBRL(v);
            }
          });
        });
      });
      MONTHS.forEach((_, mi) => {
        const input = document.getElementById(`renda-input-${mi}`);
        if (input) {
          const v = rendaValues[mi];
          input.value = v === 0 ? '' : fmtBRL(v);
        }
      });
    }

    /* ── BUILD TABLE ── */
    function buildTable() {
      const table = document.getElementById('finTable');

      // THEAD
      const thead = document.createElement('thead');
      const hrow  = document.createElement('tr');
      const thD   = document.createElement('th');
      thD.textContent = 'Despesas';
      hrow.appendChild(thD);
      MONTHS.forEach(m => {
        const th = document.createElement('th');
        th.textContent = m;
        hrow.appendChild(th);
      });
      thead.appendChild(hrow);
      table.appendChild(thead);

      const tbody = document.createElement('tbody');

      CATEGORIES.forEach(cat => {
        // Linha categoria
        const catRow = document.createElement('tr');
        catRow.className = 'cat-row';
        const tdLabel = document.createElement('td');
        tdLabel.id = `cat-td-${cat.id}`;
        tdLabel.innerHTML = `
          <span class="chevron">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5"/>
            </svg>
          </span>${cat.label}`;
        tdLabel.onclick = () => toggleCategory(cat.id);
        catRow.appendChild(tdLabel);
        MONTHS.forEach((_, mi) => {
          const td = document.createElement('td');
          td.className = 'cat-total';
          td.id = `total-${cat.id}-${mi}`;
          catRow.appendChild(td);
        });
        tbody.appendChild(catRow);

        // Linhas subcategorias
        cat.subs.forEach(sub => {
          const subRow = document.createElement('tr');
          subRow.className = `sub-row sub-${cat.id}`;
          const tdSub = document.createElement('td');
          tdSub.textContent = sub;
          subRow.appendChild(tdSub);

          MONTHS.forEach((_, mi) => {
            const td    = document.createElement('td');
            const input = document.createElement('input');
            input.type      = 'text';
            input.id        = `input-${cat.id}-${sub}-${mi}`;
            input.className = 'money-input';
            input.inputMode = 'decimal';

            input.addEventListener('focus', function () {
              const raw = values[cat.id][sub][mi];
              this.value = raw === 0 ? '' : fmtBRL(raw);
              this.select();
            });
            input.addEventListener('input', function () {
              this.value = this.value.replace(/[^\d.,]/g, '');
            });
            input.addEventListener('blur', function () {
              const parsed = parseBRL(this.value);
              values[cat.id][sub][mi] = parsed;
              this.value = parsed === 0 ? '' : fmtBRL(parsed);
              updateTotals(cat.id);
              scheduleSave();
            });
            input.addEventListener('keydown', function (e) {
              if (e.key === 'Enter') {
                e.preventDefault();
                const all = Array.from(document.querySelectorAll('.money-input'));
                const idx = all.indexOf(this);
                if (idx < all.length - 1) all[idx + 1].focus();
              }
            });

            td.appendChild(input);
            subRow.appendChild(td);
          });

          tbody.appendChild(subRow);
        });
      });

      // Total das Despesas
      const totalRow = document.createElement('tr');
      totalRow.className = 'total-row';
      const tdTotalLabel = document.createElement('td');
      tdTotalLabel.textContent = 'Total das Despesas';
      totalRow.appendChild(tdTotalLabel);
      MONTHS.forEach((_, mi) => {
        const td = document.createElement('td');
        td.className = 'total-val';
        td.id = `grand-${mi}`;
        totalRow.appendChild(td);
      });
      tbody.appendChild(totalRow);

      // Renda Mensal
      const rendaRow = document.createElement('tr');
      rendaRow.className = 'renda-row';
      const tdRendaLabel = document.createElement('td');
      tdRendaLabel.textContent = 'Renda Mensal';
      rendaRow.appendChild(tdRendaLabel);
      MONTHS.forEach((_, mi) => {
        const td    = document.createElement('td');
        const input = document.createElement('input');
        input.type      = 'text';
        input.id        = `renda-input-${mi}`;
        input.className = 'money-input';
        input.inputMode = 'decimal';

        input.addEventListener('focus', function () {
          const raw = rendaValues[mi];
          this.value = raw === 0 ? '' : fmtBRL(raw);
          this.select();
        });
        input.addEventListener('input', function () {
          this.value = this.value.replace(/[^\d.,]/g, '');
        });
        input.addEventListener('blur', function () {
          const parsed = parseBRL(this.value);
          rendaValues[mi] = parsed;
          this.value = parsed === 0 ? '' : fmtBRL(parsed);
          updateGrandAndResultado();
          scheduleSave();
        });
        input.addEventListener('keydown', function (e) {
          if (e.key === 'Enter') {
            e.preventDefault();
            const all = Array.from(document.querySelectorAll('.money-input'));
            const idx = all.indexOf(this);
            if (idx < all.length - 1) all[idx + 1].focus();
          }
        });

        td.appendChild(input);
        rendaRow.appendChild(td);
      });
      tbody.appendChild(rendaRow);

      // Resultado
      const resultadoRow = document.createElement('tr');
      resultadoRow.className = 'resultado-row';
      const tdResLabel = document.createElement('td');
      tdResLabel.textContent = 'Resultado (renda − despesas)';
      resultadoRow.appendChild(tdResLabel);
      MONTHS.forEach((_, mi) => {
        const td = document.createElement('td');
        td.className = 'resultado-val';
        td.id = `resultado-${mi}`;
        resultadoRow.appendChild(td);
      });
      tbody.appendChild(resultadoRow);

      table.appendChild(tbody);
    }
  </script>

</body>
</html>
