<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --accent: #58a6ff;
      --accent-hover: #79bcff;
      --text: #e6edf3;
      --muted: #8b949e;
      --error: #f85149;
      --success: #3fb950;
      --nav-h: 56px;
    }

    html, body {
      height: 100%;
      font-family: 'Sora', sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    /* ── TOP NAV ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--nav-h);
      background: rgba(22, 27, 34, 0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 24px;
      z-index: 100;
    }
    .nav-brand {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.3px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .nav-brand span.dot {
      width: 8px; height: 8px;
      background: var(--accent);
      border-radius: 50%;
      display: inline-block;
    }

    /* ── MAIN ── */
    main {
      min-height: 100vh;
      padding-top: var(--nav-h);
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(88,166,255,0.07) 0%, transparent 70%);
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.4);
      animation: fadeUp 0.45s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .login-card h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 4px;
      letter-spacing: -0.4px;
    }
    .login-card p.sub {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 28px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 11px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Sora', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 18px;
    }
    input:focus { border-color: var(--accent); }

    .btn {
      width: 100%;
      padding: 12px;
      background: var(--accent);
      color: #0d1117;
      font-family: 'Sora', sans-serif;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    .btn:hover  { background: var(--accent-hover); }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .msg {
      margin-top: 14px;
      font-size: 13px;
      text-align: center;
      min-height: 18px;
    }
    .msg.error   { color: var(--error); }
    .msg.success { color: var(--success); }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 20px 0;
    }
    .register-link {
      text-align: center;
      font-size: 13px;
      color: var(--muted);
    }
    .register-link a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }
    .register-link a:hover { color: var(--accent-hover); }
  </style>
</head>
<body>

  <nav>
    <div class="nav-brand">
      <span class="dot"></span>
      MeuApp
    </div>
  </nav>

  <main>
    <div class="login-card">
      <h1>Bem-vindo de volta</h1>
      <p class="sub">Faça login para continuar</p>

      <label for="email">E-mail</label>
      <input type="email" id="email" placeholder="seu@email.com" />

      <label for="password">Senha</label>
      <input type="password" id="password" placeholder="••••••••" />

      <button class="btn" id="loginBtn" onclick="handleLogin()">Entrar</button>

      <p class="msg" id="msg"></p>

      <hr class="divider" />
      <p class="register-link">Não tem conta? <a href="#" onclick="handleRegister()">Criar conta</a></p>
    </div>
  </main>

  <script>
    const { createClient } = supabase;
    const sb = createClient(
      'https://zgstzbthnzrygxgaleqm.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpnc3R6YnRobnpyeWd4Z2FsZXFtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwNDAwOTUsImV4cCI6MjA4OTYxNjA5NX0.VuPCZvb44xx1BtkQYCZqmEMy1WNfnAKf8QPhMLsjWBQ'
    );

    // Se já está logado, vai para o dashboard
    (async () => {
      const { data: { session } } = await sb.auth.getSession();
      if (session) window.location.href = 'dashboard.html';
    })();

    function setMsg(text, type) {
      const el = document.getElementById('msg');
      el.textContent = text;
      el.className = 'msg ' + type;
    }

    async function handleLogin() {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('loginBtn');

      if (!email || !password) { setMsg('Preencha todos os campos.', 'error'); return; }

      btn.disabled    = true;
      btn.textContent = 'Entrando…';
      setMsg('', '');

      const { error } = await sb.auth.signInWithPassword({ email, password });

      if (error) {
        setMsg(error.message === 'Invalid login credentials'
          ? 'E-mail ou senha incorretos.'
          : error.message, 'error');
        btn.disabled    = false;
        btn.textContent = 'Entrar';
      } else {
        setMsg('Login realizado!', 'success');
        setTimeout(() => window.location.href = 'dashboard.html', 600);
      }
    }

    async function handleRegister() {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('loginBtn');

      if (!email || !password) { setMsg('Preencha e-mail e senha para criar conta.', 'error'); return; }

      btn.disabled    = true;
      btn.textContent = 'Criando…';

      const { error } = await sb.auth.signUp({ email, password });

      if (error) {
        setMsg(error.message, 'error');
      } else {
        setMsg('Conta criada! Verifique seu e-mail se necessário.', 'success');
      }
      btn.disabled    = false;
      btn.textContent = 'Entrar';
    }

    // Enter para logar
    document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
  </script>

</body>
</html>
